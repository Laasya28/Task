<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager - Login & Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        orange: {
                            50: '#faf3ed',
                            100: '#fdf0e6',
                            200: '#e8d8c8',
                            500: '#e07a5f',
                            600: '#8d5b4c',
                            700: '#6f4e37',
                            800: '#5c4033',
                            900: '#3d2514',
                            950: '#3d2514',
                        },
                        amber: {
                            500: '#f2b591',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gradient-to-br from-orange-50 via-white to-orange-100/70 text-gray-800 min-h-screen">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-block bg-gradient-to-r from-orange-500 to-amber-500 p-3 rounded-full mb-4 shadow-md">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-orange-950 mb-2">TaskMaster</h1>
                <p class="text-orange-700 font-semibold">Student Task Manager</p>
            </div>

            <!-- Auth Container -->
            <div class="backdrop-blur-md bg-white/80 rounded-2xl p-8 shadow-2xl border border-orange-200">
                
                <!-- Tab Buttons -->
                <div class="flex gap-4 mb-8">
                    <button id="loginTab" class="tab-btn active flex-1 py-2 px-4 rounded-lg font-semibold transition-all duration-300 bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-md">
                        Login
                    </button>
                    <button id="registerTab" class="tab-btn flex-1 py-2 px-4 rounded-lg font-semibold transition-all duration-300 bg-orange-50/50 text-orange-800 border border-orange-100 hover:bg-orange-100/50">
                        Register
                    </button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="auth-form active">
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-4">
                            <label class="block text-orange-950 text-sm font-semibold mb-2">Email</label>
                            <input type="email" id="loginEmail" class="w-full px-4 py-2 rounded-lg bg-white border border-orange-200 text-gray-800 placeholder-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-6">
                            <label class="block text-orange-950 text-sm font-semibold mb-2">Password</label>
                            <input type="password" id="loginPassword" class="w-full px-4 py-2 rounded-lg bg-white border border-orange-200 text-gray-800 placeholder-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-2 px-4 rounded-lg hover:shadow-lg transition-all duration-300 transform hover:scale-105">
                            Login
                        </button>
                    </form>
                    <div class="mt-4 text-center">
                        <a href="#" onclick="showForgotPassword()" class="text-orange-600 hover:text-orange-500 font-semibold text-sm">Forgot password?</a>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="auth-form hidden">
                    <form onsubmit="handleRegister(event)">
                        <div class="mb-4">
                            <label class="block text-orange-950 text-sm font-semibold mb-2">Full Name</label>
                            <input type="text" id="registerName" class="w-full px-4 py-2 rounded-lg bg-white border border-orange-200 text-gray-800 placeholder-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="John Doe" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-orange-950 text-sm font-semibold mb-2">Email</label>
                            <input type="email" id="registerEmail" class="w-full px-4 py-2 rounded-lg bg-white border border-orange-200 text-gray-800 placeholder-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="you@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-orange-950 text-sm font-semibold mb-2">Password</label>
                            <input type="password" id="registerPassword" class="w-full px-4 py-2 rounded-lg bg-white border border-orange-200 text-gray-800 placeholder-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="••••••••" required>
                        </div>
                        <div class="mb-6">
                            <label class="block text-orange-950 text-sm font-semibold mb-2">Confirm Password</label>
                            <input type="password" id="registerConfirmPassword" class="w-full px-4 py-2 rounded-lg bg-white border border-orange-200 text-gray-800 placeholder-orange-300 focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-2 px-4 rounded-lg hover:shadow-lg transition-all duration-300 transform hover:scale-105">
                            Create Account
                        </button>
                    </form>
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="hidden text-center">
                    <div class="inline-block animate-spin">
                        <svg class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </div>
                    <p class="text-orange-800 mt-2">Processing...</p>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="mt-4 hidden p-3 rounded-lg bg-red-50 border border-red-200">
                    <p class="text-red-600 text-sm" id="errorText"></p>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="mt-4 hidden p-3 rounded-lg bg-green-50 border border-green-200">
                    <p class="text-green-600 text-sm" id="successText"></p>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-8 text-orange-700/80 text-sm font-semibold">
                <p>© 2026 Student Task Manager. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
